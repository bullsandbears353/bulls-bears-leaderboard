<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Club Leaderboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
    }
    h1 {
      text-align: center;
    }
    table {
      margin: auto;
      border-collapse: collapse;
      width: 60%;
      background: #020617;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }
    th {
      background: #020617;
    }
    tr:nth-child(even) {
      background: #020617;
    }
  </style>
</head>
<body>

<h1>Finance Club Leaderboard</h1>

<table id="leaderboard">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Portfolio Value ($)</th>
      <th>Return %</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd4ulibSZtAF880aqCN7PSbSFDVKVue2q8AB-4SCc0PG12QhHaXc_QqxBs37F7QZJAduBcDu7NVRt9/pub?gid=732807087&single=true&output=csv";

fetch(SHEET_URL + "&t=" + new Date().getTime())
  .then(response => response.text())
  .then(text => {
    const rows = text.trim().split("\n").slice(1);
    const data = rows.map(r => {
      const [name, value, ret] = r.split(",");
      return {
        name,
        value: parseFloat(value),
        ret: parseFloat(ret)
      };
    });

    data.sort((a, b) => b.ret - a.ret);

    const tbody = document.querySelector("#leaderboard tbody");
    tbody.innerHTML = "";

    data.forEach((row, i) => {

      let rankDisplay = i + 1;
      let rowStyle = "";

      if (i === 0) {
        rankDisplay = "🥇 1";
        rowStyle = "background: rgba(255, 215, 0, 0.15);";
      } else if (i === 1) {
        rankDisplay = "🥈 2";
        rowStyle = "background: rgba(192, 192, 192, 0.15);";
      } else if (i === 2) {
        rankDisplay = "🥉 3";
        rowStyle = "background: rgba(205, 127, 50, 0.15);";
      }

      const tr = document.createElement("tr");
      tr.style = rowStyle;

      tr.innerHTML = `
        <td>${rankDisplay}</td>
        <td>${row.name}</td>
        <td>${row.value.toFixed(2)}</td>
        <td style="color:${row.ret >= 0 ? '#22c55e' : '#ef4444'}">
          ${(row.ret * 100).toFixed(2)}%
        </td>
      `;

      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
