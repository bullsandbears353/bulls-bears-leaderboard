<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Club Leaderboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
    }
    h1 {
      text-align: center;
    }
    table {
      margin: auto;
      border-collapse: collapse;
      width: 60%;
      background: #020617;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }
    th {
      background: #020617;
    }
    tr:nth-child(even) {
      background: #020617;
    }
  </style>
</head>
<body>

<h1>📈 Finance Club Leaderboard</h1>

<table id="leaderboard">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Portfolio Value ($)</th>
      <th>Return %</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd4ulibSZtAF880aqCN7PSbSFDVKVue2q8AB-4SCc0PG12QhHaXc_QqxBs37F7QZJAduBcDu7NVRt9/pub?gid=732807087&single=true&output=csv";

fetch(SHEET_URL)
  .then(response => response.text())
  .then(text => {
    const rows = text.trim().split("\n").slice(1);
    const data = rows.map(r => {
      const [name, value, ret] = r.split(",");
      return {
        name,
        value: parseFloat(value),
        ret: parseFloat(ret)
      };
    });

    data.sort((a, b) => b.ret - a.ret);

    const tbody = document.querySelector("#leaderboard tbody");

    data.forEach((row, i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${row.name}</td>
        <td>${row.value.toFixed(2)}</td>
        <td>${(row.ret * 100).toFixed(2)}%</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
