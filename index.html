<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Club Leaderboard</title>

<style>

body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:40px;
}

h1{
  text-align:center;
  margin-bottom:10px;
}

#updateTime{
  text-align:center;
  opacity:.7;
  margin-bottom:25px;
}

.main{
  display:flex;
  gap:40px;
  align-items:flex-start;
}

/* LEFT PANEL */

.leftPanel{
  width:260px;
}

.card{
  background:#020617;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
}

.card h2{
  margin-top:0;
  font-size:18px;
  border-bottom:1px solid #334155;
  padding-bottom:8px;
}

/* STATS */

.stat{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
}

/* HEATMAP */

.heatmap{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.heatTile{
  width:50px;
  height:50px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:11px;
  border-radius:6px;
  font-weight:bold;
  transition:transform .15s ease;
}

.heatTile:hover{
  transform:scale(1.08);
}

/* LEADERBOARD */

table{
  border-collapse:collapse;
  width:650px;
  background:#020617;
}

th,td{
  padding:12px;
  border-bottom:1px solid #334155;
  text-align:center;
}

tr{
  transition:background .2s ease;
}

tr:hover{
  background:#1e293b;
}

.bar-container{
  width:100%;
  background:#1e293b;
  height:8px;
  border-radius:5px;
  margin-top:4px;
}

.bar{
  height:8px;
  border-radius:5px;
  background:#22c55e;
}

</style>
</head>

<body>

<h1>Finance Club Leaderboard</h1>
<p id="updateTime"></p>

<div class="main">

<div class="leftPanel">

<div class="card">
<h2>Club Stats</h2>

<div class="stat">
<span>Participants</span>
<span id="statPlayers">-</span>
</div>

<div class="stat">
<span>Avg Return</span>
<span id="statAvg">-</span>
</div>

<div class="stat">
<span>Best Return</span>
<span id="statBest">-</span>
</div>

<div class="stat">
<span>Worst Return</span>
<span id="statWorst">-</span>
</div>

</div>

<div class="card">
<h2>Market Heatmap</h2>
<div id="heatmap" class="heatmap"></div>
</div>

</div>

<div>

<table id="leaderboard">

<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Portfolio Value</th>
<th>Return %</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQd4ulibSZtAF880aqCN7PSbSFDVKVue2q8AB-4SCc0PG12QhHaXc_QqxBs37F7QZJAduBcDu7NVRt9/pub?gid=732807087&single=true&output=csv";

let previousRanks = JSON.parse(localStorage.getItem("leaderboardRanks") || "{}");

async function loadLeaderboard(){

const response = await fetch(SHEET_URL + "&t=" + new Date().getTime());
const text = await response.text();

const rows = text.trim().split("\n").slice(1);

let allStocks = [];

const data = rows.map(r=>{

const cols=r.split(",");

let stocks=[];

for(let i=3;i<cols.length;i+=4){

if(cols[i]){

let ticker=cols[i];
let ret=parseFloat(cols[i+3]);

let stockObj={
ticker:ticker,
shares:cols[i+1],
value:parseFloat(cols[i+2]),
ret:ret
};

stocks.push(stockObj);
allStocks.push(stockObj);

}

}

stocks.sort((a,b)=>b.ret-a.ret);

return{
name:cols[0],
value:parseFloat(cols[1]),
ret:parseFloat(cols[2]),
stocks
};

});

data.sort((a,b)=>b.ret-a.ret);

/* CLUB STATS */

let avg = data.reduce((a,b)=>a+b.ret,0)/data.length;

document.getElementById("statPlayers").innerText=data.length;
document.getElementById("statAvg").innerText=(avg*100).toFixed(2)+"%";
document.getElementById("statBest").innerText=(data[0].ret*100).toFixed(2)+"%";
document.getElementById("statWorst").innerText=(data[data.length-1].ret*100).toFixed(2)+"%";

/* HEATMAP */

const heatmap=document.getElementById("heatmap");
heatmap.innerHTML="";

allStocks.sort((a,b)=>b.ret-a.ret);

const maxAbsReturn=Math.max(...allStocks.map(s=>Math.abs(s.ret)));

allStocks.forEach(s=>{

const intensity=Math.abs(s.ret)/maxAbsReturn;

let red=0;
let green=0;

if(s.ret>=0){
green=Math.round(255*intensity);
}else{
red=Math.round(255*intensity);
}

let tile=document.createElement("div");

tile.className="heatTile";
tile.style.background=`rgb(${red},${green},0)`;

tile.innerHTML=`
${s.ticker}
<br>
${(s.ret*100).toFixed(1)}%
`;

heatmap.appendChild(tile);

});

/* LEADERBOARD */

const tbody=document.querySelector("#leaderboard tbody");
tbody.innerHTML="";

data.forEach((row,i)=>{

let medal="";
let medalColor="";

if(i===0){medal="🥇 "; medalColor="#FFD700";}
else if(i===1){medal="🥈 "; medalColor="#C0C0C0";}
else if(i===2){medal="🥉 "; medalColor="#CD7F32";}

const prevRank = previousRanks[row.name];
let change="";

if(prevRank){

let diff=prevRank-(i+1);

if(diff>0) change="⬆ "+diff;
if(diff<0) change="⬇ "+Math.abs(diff);

}

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${i+1}</td>

<td>

<div style="display:flex; justify-content:space-between; cursor:pointer;"
onclick="toggleRow(${i})">

<span style="color:${medalColor}; font-weight:bold">
${medal}${row.name} ${change}
</span>

<span id="arrow-${i}" style="transition:transform .3s">▼</span>

</div>

</td>

<td>

$${row.value.toFixed(2)}

<div class="bar-container">
<div class="bar" style="width:${(row.value/data[0].value)*100}%"></div>
</div>

</td>

<td style="color:${row.ret>=0?'#22c55e':'#ef4444'}">
${(row.ret*100).toFixed(2)}%
</td>

`;

tbody.appendChild(tr);

const detailRow=document.createElement("tr");
detailRow.id="detail-"+i;

detailRow.innerHTML=`

<td colspan="4">

<div id="content-${i}" style="max-height:0; overflow:hidden; transition:max-height .4s">

${row.stocks.map(s=>`

<div style="display:flex; justify-content:space-between; padding:6px 0">

<span>${s.ticker} (${parseFloat(s.shares).toFixed(2)} shares)</span>

<span style="color:${s.ret>=0?'#22c55e':'#ef4444'}">
${(s.ret*100).toFixed(2)}%
</span>

</div>

`).join("")}

</div>

</td>

`;

tbody.appendChild(detailRow);

});

let newRanks={};

data.forEach((row,i)=>{
newRanks[row.name]=i+1;
});

localStorage.setItem("leaderboardRanks",JSON.stringify(newRanks));

document.getElementById("updateTime").innerText =
"Last updated: "+new Date().toLocaleTimeString();

}

function toggleRow(index){

const content=document.getElementById("content-"+index);
const arrow=document.getElementById("arrow-"+index);

if(content.style.maxHeight==="0px"||content.style.maxHeight===""){

content.style.maxHeight=content.scrollHeight+"px";
arrow.style.transform="rotate(180deg)";

}else{

content.style.maxHeight="0px";
arrow.style.transform="rotate(0deg)";

}

}

loadLeaderboard();

setInterval(loadLeaderboard,120000);

</script>

</body>
</html>
