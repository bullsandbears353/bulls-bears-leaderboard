<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Club Leaderboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
    }
    h1 {
      text-align: center;
    }
    table {
      margin: auto;
      border-collapse: collapse;
      width: 60%;
      background: #020617;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }
    th {
      background: #020617;
    }
    tr:nth-child(even) {
      background: #020617;
    }
  </style>
</head>
<body>

<h1>Finance Club Leaderboard</h1>

<table id="leaderboard">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Portfolio Value ($)</th>
      <th>Return %</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd4ulibSZtAF880aqCN7PSbSFDVKVue2q8AB-4SCc0PG12QhHaXc_QqxBs37F7QZJAduBcDu7NVRt9/pub?gid=732807087&single=true&output=csv";

async function loadLeaderboard() {
  const response = await fetch(SHEET_URL + "&t=" + new Date().getTime());
  const text = await response.text();

  const rows = text.trim().split("\n").slice(1);

  const data = rows.map(r => {
    const cols = r.split(",");

    let stocks = [];

    for (let i = 3; i < cols.length; i += 4) {
      if (cols[i]) {
        stocks.push({
          ticker: cols[i],
          shares: cols[i+1],
          value: parseFloat(cols[i+2]),
          ret: parseFloat(cols[i+3])
        });
      }
    }

    // Sort stocks from most profitable to least
    stocks.sort((a,b) => b.ret - a.ret);

    return {
      name: cols[0],
      value: parseFloat(cols[1]),
      ret: parseFloat(cols[2]),
      stocks
    };
  });

  // Sort leaderboard by total return
  data.sort((a, b) => b.ret - a.ret);

  const tbody = document.querySelector("#leaderboard tbody");
  tbody.innerHTML = "";

  data.forEach((row, i) => {

    let medal = "";
    let medalColor = "";

    if (i === 0) {
      medal = "🥇 ";
      medalColor = "#FFD700";
    } else if (i === 1) {
      medal = "🥈 ";
      medalColor = "#C0C0C0";
    } else if (i === 2) {
      medal = "🥉 ";
      medalColor = "#CD7F32";
    }

    // MAIN ROW
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>
        <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;"
             onclick="toggleRow(${i})">
          <span style="color:${medalColor}; font-weight:bold;">
            ${medal}${row.name}
          </span>
          <span id="arrow-${i}" style="transition: transform 0.3s ease;">▼</span>
        </div>
      </td>
      <td>${row.value.toFixed(2)}</td>
      <td style="color:${row.ret >= 0 ? '#22c55e' : '#ef4444'}">
        ${(row.ret * 100).toFixed(2)}%
      </td>
    `;

    tbody.appendChild(tr);

    // DETAIL ROW
    const detailRow = document.createElement("tr");
    detailRow.id = "detail-" + i;

    detailRow.innerHTML = `
      <td colspan="4">
        <div id="content-${i}" 
             style="max-height:0; overflow:hidden; transition:max-height 0.4s ease;">
          ${row.stocks.map(s => `
            <div style="display:flex; justify-content:space-between; padding:6px 0;">
              <span>${s.ticker} (${s.shares} shares)</span>
              <span style="color:${s.ret >= 0 ? '#22c55e' : '#ef4444'}">
                ${(s.ret * 100).toFixed(2)}%
              </span>
            </div>
          `).join("")}
        </div>
      </td>
    `;

    tbody.appendChild(detailRow);
  });
}

function toggleRow(index) {
  const content = document.getElementById("content-" + index);
  const arrow = document.getElementById("arrow-" + index);

  if (content.style.maxHeight === "0px" || content.style.maxHeight === "") {
    content.style.maxHeight = content.scrollHeight + "px";
    arrow.style.transform = "rotate(180deg)";
  } else {
    content.style.maxHeight = "0px";
    arrow.style.transform = "rotate(0deg)";
  }
}

loadLeaderboard();
setInterval(loadLeaderboard, 60000);
</script>

</body>
</html>
