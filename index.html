<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Club Leaderboard</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  padding:40px;
}

h1{
  text-align:center;
}

#updateTime{
  text-align:center;
  opacity:0.7;
  margin-bottom:20px;
}

/* CLUB STATS */

#clubStats{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-bottom:30px;
  font-size:18px;
  flex-wrap:wrap;
}

.statBox{
  background:#020617;
  padding:15px 25px;
  border-radius:8px;
  text-align:center;
  border:1px solid #334155;
}

/* TABLE */

table{
  margin:auto;
  border-collapse:collapse;
  width:60%;
  background:#020617;
}

th,td{
  padding:12px;
  border-bottom:1px solid #334155;
  text-align:center;
}

tr{
  transition:background 0.2s ease;
}

tr:hover{
  background:#1e293b;
}

th{
  background:#020617;
}

.bar-container{
  width:100%;
  background:#1e293b;
  height:8px;
  border-radius:5px;
  margin-top:4px;
}

.bar{
  height:8px;
  border-radius:5px;
  background:#22c55e;
}

/* HEATMAP */

#heatmapTitle{
  text-align:center;
  margin-top:40px;
}

#heatmap{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.heatBox{
  padding:14px;
  min-width:80px;
  text-align:center;
  border-radius:6px;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>Finance Club Leaderboard</h1>

<div id="clubStats"></div>

<p id="updateTime"></p>

<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Portfolio Value ($)</th>
<th>Return %</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2 id="heatmapTitle">Club Market Heatmap</h2>
<div id="heatmap"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQd4ulibSZtAF880aqCN7PSbSFDVKVue2q8AB-4SCc0PG12QhHaXc_QqxBs37F7QZJAduBcDu7NVRt9/pub?gid=732807087&single=true&output=csv";

let previousRanks = JSON.parse(localStorage.getItem("leaderboardRanks") || "{}");

async function loadLeaderboard(){

const response = await fetch(SHEET_URL + "&t=" + new Date().getTime());
const text = await response.text();

const rows = text.trim().split("\n").slice(1);

const data = rows.map(r=>{

const cols = r.split(",");

let stocks=[];

for(let i=3;i<cols.length;i+=4){

if(cols[i]){

stocks.push({
ticker:cols[i],
shares:cols[i+1],
value:parseFloat(cols[i+2]),
ret:parseFloat(cols[i+3])
});

}

}

stocks.sort((a,b)=>b.ret-a.ret);

return{
name:cols[0],
value:parseFloat(cols[1]),
ret:parseFloat(cols[2]),
stocks
};

});

data.sort((a,b)=>b.ret-a.ret);

const tbody=document.querySelector("#leaderboard tbody");
tbody.innerHTML="";

/* CLUB STATS CALCULATION */

let totalTraders=data.length;

let avgReturn=data.reduce((sum,p)=>sum+p.ret,0)/totalTraders;

let bestReturn=Math.max(...data.map(p=>p.ret));

let stockCount={};

data.forEach(p=>{
p.stocks.forEach(s=>{
stockCount[s.ticker]=(stockCount[s.ticker]||0)+1;
});
});

let mostPopularStock=Object.keys(stockCount).reduce((a,b)=>
stockCount[a]>stockCount[b]?a:b);

/* DISPLAY CLUB STATS */

document.getElementById("clubStats").innerHTML=`

<div class="statBox">
Total Traders<br><b>${totalTraders}</b>
</div>

<div class="statBox">
Average Return<br><b>${(avgReturn*100).toFixed(2)}%</b>
</div>

<div class="statBox">
Best Return<br><b>${(bestReturn*100).toFixed(2)}%</b>
</div>

<div class="statBox">
Most Popular Stock<br><b>${mostPopularStock}</b>
</div>

`;

/* LEADERBOARD */

data.forEach((row,i)=>{

let medal="";
let medalColor="";

if(i===0){ medal="🥇 "; medalColor="#FFD700";}
else if(i===1){ medal="🥈 "; medalColor="#C0C0C0";}
else if(i===2){ medal="🥉 "; medalColor="#CD7F32";}

const prevRank = previousRanks[row.name];
let change="";

if(prevRank){

const diff = prevRank-(i+1);

if(diff>0) change="⬆️ "+diff;
if(diff<0) change="⬇️ "+Math.abs(diff);

}

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${i+1}</td>

<td>
<div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;"
onclick="toggleRow(${i})">

<span style="color:${medalColor}; font-weight:bold;">
${medal}${row.name} ${change}
</span>

<span id="arrow-${i}" style="transition:transform 0.3s ease;">▼</span>

</div>
</td>

<td>

$${row.value.toFixed(2)}

<div class="bar-container">
<div class="bar" style="width:${(row.value/data[0].value)*100}%"></div>
</div>

</td>

<td style="color:${row.ret>=0 ? '#22c55e':'#ef4444'}">

${(row.ret*100).toFixed(2)}%

</td>

`;

tbody.appendChild(tr);

const detailRow=document.createElement("tr");
detailRow.id="detail-"+i;

detailRow.innerHTML=`

<td colspan="4">

<div id="content-${i}" style="max-height:0; overflow:hidden; transition:max-height 0.4s ease;">

${row.stocks.map(s=>`

<div style="display:flex; justify-content:space-between; padding:6px 0;">

<span>${s.ticker} (${parseFloat(s.shares).toFixed(2)} shares)</span>

<span style="color:${s.ret>=0 ? '#22c55e':'#ef4444'}">

${(s.ret*100).toFixed(2)}%

</span>

</div>

`).join("")}

</div>

</td>

`;

tbody.appendChild(detailRow);

});

/* SAVE RANKS */

let newRanks={};

data.forEach((row,i)=>{

newRanks[row.name]=i+1;

});

localStorage.setItem("leaderboardRanks",JSON.stringify(newRanks));

document.getElementById("updateTime").innerText =
"Last updated: "+new Date().toLocaleTimeString();

/* HEATMAP */

const heatmap=document.getElementById("heatmap");
heatmap.innerHTML="";

let stockMap={};

data.forEach(player=>{
player.stocks.forEach(s=>{

if(!stockMap[s.ticker]){
stockMap[s.ticker]=[];
}

stockMap[s.ticker].push(s.ret);

});
});

Object.keys(stockMap).forEach(ticker=>{

const avg=stockMap[ticker].reduce((a,b)=>a+b,0)/stockMap[ticker].length;

let intensity=Math.min(Math.abs(avg)*5,1);

let color=avg>=0
?`rgba(34,197,94,${intensity})`
:`rgba(239,68,68,${intensity})`;

const box=document.createElement("div");
box.className="heatBox";
box.style.background=color;

box.innerHTML=`
${ticker}<br>
${(avg*100).toFixed(2)}%
`;

heatmap.appendChild(box);

});

}

function toggleRow(index){

const content=document.getElementById("content-"+index);
const arrow=document.getElementById("arrow-"+index);

if(content.style.maxHeight==="0px"||content.style.maxHeight===""){

content.style.maxHeight=content.scrollHeight+"px";
arrow.style.transform="rotate(180deg)";

}else{

content.style.maxHeight="0px";
arrow.style.transform="rotate(0deg)";

}

}

loadLeaderboard();

setInterval(loadLeaderboard,3600000);

</script>

</body>
</html>
