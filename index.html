<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd4ulibSZtAF880aqCN7PSbSFDVKVue2q8AB-4SCc0PG12QhHaXc_QqxBs37F7QZJAduBcDu7NVRt9/pub?gid=732807087&single=true&output=csv";

function loadLeaderboard() {
  fetch(SHEET_URL + "&t=" + new Date().getTime()) // prevents caching
    .then(response => response.text())
    .then(text => {
      const rows = text.trim().split("\n").slice(1);
      const data = rows.map(r => {
        const [name, value, ret] = r.split(",");
        return {
          name,
          value: parseFloat(value),
          ret: parseFloat(ret)
        };
      });

      data.sort((a, b) => b.ret - a.ret);

      const tbody = document.querySelector("#leaderboard tbody");
      tbody.innerHTML = "";

      data.forEach((row, i) => {
        let medal = i + 1;
        let medalClass = "";

        if (i === 0) {
          medal = "🥇";
          medalClass = "gold";
        } else if (i === 1) {
          medal = "🥈";
          medalClass = "silver";
        } else if (i === 2) {
          medal = "🥉";
          medalClass = "bronze";
        }

        const returnClass = row.ret >= 0 ? "positive" : "negative";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="${medalClass}">${medal}</td>
          <td>${row.name}</td>
          <td>$${row.value.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
          <td class="${returnClass}">
            ${(row.ret * 100).toFixed(2)}%
          </td>
        `;
        tbody.appendChild(tr);
      });
    });
}

loadLeaderboard();
setInterval(loadLeaderboard, 60000); // auto refresh every 60 seconds
</script>
